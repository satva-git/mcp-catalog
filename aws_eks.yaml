name: AWS EKS
shortDescription: Manage Amazon EKS clusters, Kubernetes resources, and containerized applications
description: 'A Model Context Protocol (MCP) server for Amazon EKS that provides AI code assistants with resource management tools and real-time cluster state visibility. Streamline application development through tailored guidance from initial setup through production optimization and troubleshooting.


  ## Features

  - Enables users of AI code assistants to create new EKS clusters, complete with prerequisites such as dedicated VPCs, networking, and EKS Auto Mode node pools, by translating requests into the appropriate AWS CloudFormation actions

  - Provides the ability to deploy containerized applications by applying existing Kubernetes YAML files or by generating new deployment and service manifests based on user-provided parameters

  - Supports full lifecycle management of individual Kubernetes resources (such as Pods, Services, and Deployments) within EKS clusters, enabling create, read, update, patch, and delete operations

  - Provides the ability to list Kubernetes resources with filtering by namespace, labels, and fields, simplifying the process for both users and LLMs to gather information about the state of Kubernetes applications and EKS infrastructure

  - Facilitates operational tasks such as retrieving logs from specific pods and containers or fetching Kubernetes events related to particular resources, supporting troubleshooting and monitoring for both direct users and AI-driven workflows

  - Enables users to troubleshoot issues with an EKS cluster


  ## What you''ll need to connect


  **Required AWS Credentials:**

  - **AWS Access Key ID**: Your AWS credential access key

  - **AWS Secret Access Key**: Your AWS credential access secret


  **Optional Configuration:**

  - **AWS Region**: AWS region to use (default: `us-east-1`)

  - **AWS Session Token**: Required only for temporary credentials like SSO or STS AssumeRole


  **IAM Permissions Required:**

  - **Read Operations**: EKS describe, CloudFormation describe, CloudWatch metrics, IAM get policies

  - **Write Operations**: Full access to IAM, VPC, CloudFormation, and EKS for cluster creation and management


  **Kubernetes Access:** Your IAM principal must either create the EKS cluster or have an EKS Access Entry configured.

  '
metadata:
  categories: Cloud & Infrastructure
icon: https://avatars.githubusercontent.com/u/3299148?s=48&v=4
repoURL: https://github.com/awslabs/mcp/tree/main/src/eks-mcp-server
env:
- key: AWS_ACCESS_KEY_ID
  name: AWS Access Key ID
  required: true
  sensitive: false
  description: Your AWS Access Key ID
- key: AWS_SECRET_ACCESS_KEY
  name: AWS Secret Access Key
  required: true
  sensitive: true
  description: AWS Secret Access Key
- key: AWS_SESSION_TOKEN
  name: AWS Session Token
  required: false
  sensitive: true
  description: AWS Session Token, only required if using temporary credentials such as temporary AWS credentials, such as those obtained through aws sso login or other temporary access methods (for example, STS AssumeRole)
- key: AWS_REGION
  name: AWS Region
  required: true
  sensitive: false
  description: AWS Region
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/aws-eks:0.1.27
  port: 8099
  path: /
  args:
  - awslabs.eks-mcp-server
  - --allow-write
  - --allow-sensitive-data-access
toolPreview:
- name: manage_eks_stacks
  description: Manage EKS CloudFormation stacks with both read and write operations.
  params:
    operation: 'Operation to perform: generate, deploy, describe, or delete. Choose "describe" for read-only operations when write access is disabled.'
    template_file: 'Absolute path for the CloudFormation template (for generate and deploy operations).
      IMPORTANT: Assistant must provide the full absolute path to the template file, as the MCP client and server might not run from the same location.'
    cluster_name: 'Name of the EKS cluster (for generate, deploy, describe and delete operations).
      This name will be used to derive the CloudFormation stack name and will be embedded in the cluster resources.'
- name: list_k8s_resources
  description: List Kubernetes resources of a specific kind.
  params:
    cluster_name: Name of the EKS cluster where the resources are located.
    kind: 'Kind of the Kubernetes resources to list (e.g., ''Pod'', ''Service'', ''Deployment'').
      Use the list_api_versions tool to find available resource kinds.'
    api_version: 'API version of the Kubernetes resources (e.g., ''v1'', ''apps/v1'', ''networking.k8s.io/v1'').
      Use the list_api_versions tool to find available API versions.'
    namespace: 'Namespace of the Kubernetes resources to list.
      If not provided, resources will be listed across all namespaces (for namespaced resources).'
    label_selector: 'Label selector to filter resources (e.g., ''app=nginx,tier=frontend'').
      Uses the same syntax as kubectl''s --selector flag.'
    field_selector: 'Field selector to filter resources (e.g., ''metadata.name=my-pod,status.phase=Running'').
      Uses the same syntax as kubectl''s --field-selector flag.'
- name: manage_k8s_resource
  description: Manage a single Kubernetes resource with various operations.
  params:
    operation: 'Operation to perform on the resource. Valid values:
      - create: Create a new resource
      - replace: Replace an existing resource
      - patch: Update specific fields of an existing resource
      - delete: Delete an existing resource
      - read: Get details of an existing resource
      Use list_k8s_resources for listing multiple resources.'
    cluster_name: Name of the EKS cluster where the resource is located or will be created.
    kind: Kind of the Kubernetes resource (e.g., "Pod", "Service", "Deployment").
    api_version: API version of the Kubernetes resource (e.g., "v1", "apps/v1", "networking.k8s.io/v1").
    name: Name of the Kubernetes resource. Required for all operations except create (where it can be specified in the body).
    namespace: 'Namespace of the Kubernetes resource. Required for namespaced resources.
      Not required for cluster-scoped resources (like Nodes, PersistentVolumes).'
    body: 'Resource definition as a dictionary. Required for create, replace, and patch operations.
      For create and replace, this should be a complete resource definition.
      For patch, this should contain only the fields to update.'
- name: apply_yaml
  description: Apply a Kubernetes YAML from a local file.
  params:
    yaml_path: 'Absolute path to the YAML file to apply.
      IMPORTANT: Must be an absolute path (e.g., ''/home/user/manifests/app.yaml'') as the MCP client and server might not run from the same location.'
    cluster_name: Name of the EKS cluster where the resources will be created or updated.
    namespace: Kubernetes namespace to apply resources to. Will be used for namespaced resources that do not specify a namespace.
    force: Whether to update resources if they already exist (similar to kubectl apply). Set to false to only create new resources.
- name: list_api_versions
  description: List all available API versions in the Kubernetes cluster.
  params:
    cluster_name: Name of the EKS cluster to query for available API versions.
- name: generate_app_manifest
  description: Generate Kubernetes manifest for a deployment and service.
  params:
    app_name: Name of the application. Used for deployment and service names, and for labels.
    image_uri: 'Full ECR image URI with tag (e.g., 123456789012.dkr.ecr.region.amazonaws.com/repo:tag).
      Must include the full repository path and tag.'
    output_dir: Absolute path to the directory to save the manifest file
    port: Container port that the application listens on
    replicas: Number of replicas to deploy
    cpu: CPU request for each container (e.g., "100m" for 0.1 CPU cores, "500m" for half a core).
    memory: Memory request for each container (e.g., "128Mi" for 128 MiB, "1Gi" for 1 GiB).
    namespace: 'Kubernetes namespace to deploy the application to. Default: "default"'
    load_balancer_scheme: 'AWS load balancer scheme. Options: "internal" (private VPC only) or "internet-facing" (public access).'
- name: get_pod_logs
  description: Get logs from a pod in a Kubernetes cluster.
  params:
    cluster_name: Name of the EKS cluster where the pod is running.
    namespace: Kubernetes namespace where the pod is located.
    pod_name: Name of the pod to retrieve logs from.
    container_name: Name of the specific container to get logs from. Required only if the pod contains multiple containers.
    since_seconds: Only return logs newer than this many seconds. Useful for getting recent logs without retrieving the entire history.
    tail_lines: 'Number of lines to return from the end of the logs. Default: 100. Use higher values for more context.'
    limit_bytes: 'Maximum number of bytes to return. Default: 10KB (10240 bytes). Prevents retrieving extremely large log files.'
    previous: 'Return previous terminated container logs. Default: false. Useful to get logs for pods that are restarting.'
- name: get_k8s_events
  description: Get events related to a specific Kubernetes resource.
  params:
    cluster_name: Name of the EKS cluster where the resource is located.
    kind: Kind of the involved object (e.g., "Pod", "Deployment", "Service"). Must match the resource kind exactly.
    name: Name of the involved object to get events for.
    namespace: 'Namespace of the involved object. Required for namespaced resources (like Pods, Deployments).
      Not required for cluster-scoped resources (like Nodes, PersistentVolumes).'
- name: get_cloudwatch_logs
  description: Get logs from CloudWatch for a specific resource.
  params:
    resource_type: 'Resource type to search logs for. Valid values: "pod", "node", "container". This determines how logs are filtered.'
    cluster_name: Name of the EKS cluster where the resource is located. Used to construct the CloudWatch log group name.
    log_type: 'Log type to query. Options:
      - "application": Container/application logs
      - "host": Node-level system logs
      - "performance": Performance metrics logs
      - "control-plane": EKS control plane logs
      - Or provide a custom CloudWatch log group name directly'
    resource_name: Resource name to search for in log messages (e.g., pod name, node name, container name). Used to filter logs for the specific resource.
    minutes: 'Number of minutes to look back for logs. Default: 15. Ignored if start_time is provided. Use smaller values for recent issues, larger values for historical analysis.'
    start_time: 'Start time in ISO format (e.g., "2023-01-01T00:00:00Z"). If provided, overrides the minutes parameter. IMPORTANT: Use this for precise time ranges.'
    end_time: 'End time in ISO format (e.g., "2023-01-01T01:00:00Z"). If not provided, defaults to current time. IMPORTANT: Use with start_time for precise time ranges.'
    limit: 'Maximum number of log entries to return. Use lower values (10-50) for faster queries, higher values (100-1000) for more comprehensive results. IMPORTANT: Higher values may impact performance.'
    filter_pattern: 'Additional CloudWatch Logs filter pattern to apply. Uses CloudWatch Logs Insights syntax (e.g., "ERROR", "field=value"). IMPORTANT: Use this to narrow down results for specific issues.'
    fields: 'Custom fields to include in the query results (defaults to "@timestamp, @message"). Use CloudWatch Logs Insights field syntax. IMPORTANT: Only specify if you need fields beyond the default timestamp and message.'
- name: get_cloudwatch_metrics
  description: Get metrics from CloudWatch for a specific resource.
  params:
    cluster_name: Name of the EKS cluster to get metrics for.
    metric_name: 'Metric name to retrieve. Common examples:
      - cpu_usage_total: Total CPU usage
      - memory_rss: Resident Set Size memory usage
      - network_rx_bytes: Network bytes received
      - network_tx_bytes: Network bytes transmitted'
    namespace: 'CloudWatch namespace where the metric is stored. Common values:
      - "ContainerInsights": For container metrics
      - "AWS/EC2": For EC2 instance metrics
      - "AWS/EKS": For EKS control plane metrics'
    dimensions: Dimensions to use for the CloudWatch metric query. Must include appropriate dimensions for the resource type and metric (e.g., ClusterName, PodName, Namespace).
    minutes: 'Number of minutes to look back for metrics. Default: 15. Ignored if start_time is provided. IMPORTANT: Choose a time range appropriate for the metric resolution.'
    start_time: 'Start time in ISO format (e.g., "2023-01-01T00:00:00Z"). If provided, overrides the minutes parameter. IMPORTANT: Use this for precise historical analysis.'
    end_time: 'End time in ISO format (e.g., "2023-01-01T01:00:00Z"). If not provided, defaults to current time. IMPORTANT: Use with start_time for precise time ranges.'
    limit: 'Maximum number of data points to return. Higher values (100-1000) provide more granular data but may impact performance. IMPORTANT: Balance between granularity and performance.'
    period: 'Period in seconds for the metric data points. Default: 60 (1 minute). Lower values (1-60) provide higher resolution but may be less available. IMPORTANT: Match to your monitoring needs.'
    stat: 'Statistic to use for the metric aggregation:
      - Average: Mean value during the period
      - Sum: Total value during the period
      - Maximum: Highest value during the period
      - Minimum: Lowest value during the period
      - SampleCount: Number of samples during the period'
- name: get_eks_metrics_guidance
  description: Get CloudWatch metrics guidance for specific resource types in EKS clusters.
  params:
    resource_type: Type of resource to get metrics for (cluster, node, pod, namespace, service)
- name: get_eks_vpc_config
  description: Get VPC configuration for an EKS cluster.
  params:
    cluster_name: Name of the EKS cluster to get VPC configuration for
    vpc_id: ID of the specific VPC to query (optional, will use cluster VPC if not specified)
- name: get_eks_insights
  description: Get EKS Insights for cluster configuration and upgrade readiness.
  params:
    cluster_name: Name of the EKS cluster
    insight_id: ID of a specific insight to get detailed information for. If provided, returns detailed information about this specific insight.
    category: Filter insights by category (e.g., "MISCONFIGURATION" or "UPGRADE_READINESS")
    next_token: Token for pagination to get the next set of results
- name: get_policies_for_role
  description: Get all policies attached to an IAM role.
  params:
    role_name: Name of the IAM role to get policies for. The role must exist in your AWS account.
- name: add_inline_policy
  description: Add a new inline policy to an IAM role.
  params:
    policy_name: Name of the inline policy to create. Must be unique within the role.
    role_name: Name of the IAM role to add the policy to. The role must exist.
    permissions: 'Permissions to include in the policy as IAM policy statements in JSON format.
      Can be either a single statement object or an array of statement objects.'
- name: search_eks_troubleshoot_guide
  description: Search the EKS Troubleshoot Guide for troubleshooting information.
  params:
    query: Your specific question or issue description related to EKS troubleshooting
