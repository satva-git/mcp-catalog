name: MongoDB Atlas Management
shortDescription: Create and manage MongoDB Atlas projects, clusters, and database users
description: |
  A Model Context Protocol (MCP) server for interacting with the MongoDB Atlas Cloud Service. This connector allows you to perform management actions with clusters, projects, databases, collections, and database users.

  ## Features
  - **Atlas Management**: Create and manage MongoDB Atlas projects, clusters, and database users
  - **Cluster Management**: List, inspect, and create MongoDB Atlas clusters including free tier clusters

  ## What you'll need to connect

  ### MongoDB Atlas API Credentials (Required)
  You'll need Service Account Atlas API credentials to use the Atlas management tools:

  - **API Client ID**: Your MongoDB Atlas Service Account Client ID
  - **API Client Secret**: Your MongoDB Atlas Service Account Client Secret (keep this secure)

  ### Setting up Atlas API Access

  1. **Create a Service Account:**
  - Log in to MongoDB Atlas at [cloud.mongodb.com](https://cloud.mongodb.com)
  - Navigate to Access Manager > Organization Access
  - Click Add New > Applications > Service Accounts
  - Enter name, description and expiration for your service account
  - (Recommended) Assign only the minimum permissions needed for your use case

  2. **Save Client Credentials:**
  - After creation, copy and save the Client ID and Client Secret
  - **Important:** The Client Secret won't be displayed again

  ### Required Permissions by Operation

  | Operation | Required Role | Scope |
  # |-----------|---------------|-------|
  | List organizations/projects | Org Member or Org Read Only | Organization |
  | Create new projects | Org Project Creator | Organization |
  | View clusters/databases | Project Read Only | Project |
  | Create/manage clusters | Project Cluster Manager | Project |
  | Manage IP access lists | Project IP Access List Admin | Project |
  | Manage database users | Project Database Access Admin | Project |

  **Security Note:** Prefer project-level roles for most operations. Avoid Organization Owner unless you require full administrative control.

metadata:
  categories: Databases,Data & Analytics
icon: https://avatars.githubusercontent.com/u/45120?s=48&v=4
repoURL: https://github.com/mongodb-js/mongodb-mcp-server
env:
- key: MDB_MCP_API_CLIENT_ID
  name: MongoDB API Client ID
  required: true
  sensitive: false
  description: The client ID for your MongoDB Service Accounts Atlas API credentials.
- key: MDB_MCP_API_CLIENT_SECRET
  name: MongoDB API Client Secret
  required: true
  sensitive: true
  description: The client secret for your MongoDB Service Accounts Atlas API credentials.
toolPreview:
- name: atlas-list-clusters
  description: "List MongoDB Atlas clusters"
  params:
    projectId: "Atlas project ID to filter clusters"
- name: atlas-list-projects
  description: "List MongoDB Atlas projects"
  params:
    orgId: "Atlas organization ID to filter projects. If not provided, projects for all orgs are returned."
- name: atlas-inspect-cluster
  description: "Inspect metadata of a MongoDB Atlas cluster"
  params:
    projectId: "Atlas project ID"
    clusterName: "Atlas cluster name"
- name: atlas-create-free-cluster
  description: "Create a free MongoDB Atlas cluster"
  params:
    projectId: "Atlas project ID to create the cluster in"
    name: "Name of the cluster"
    region: "Region of the cluster"
- name: atlas-create-access-list
  description: "Allow Ip/CIDR ranges to access your MongoDB Atlas clusters."
  params:
    projectId: "Atlas project ID"
    ipAddresses: "IP addresses to allow access from"
    cidrBlocks: "CIDR blocks to allow access from"
    currentIpAddress: "Add the current IP address"
    comment: "Comment for the access list entries"
- name: atlas-inspect-access-list
  description: "Inspect Ip/CIDR ranges with access to your MongoDB Atlas clusters."
  params:
    projectId: "Atlas project ID"
- name: atlas-list-db-users
  description: "List MongoDB Atlas database users"
  params:
    projectId: "Atlas project ID to filter DB users"
- name: atlas-create-db-user
  description: "Create an MongoDB Atlas database user"
  params:
    projectId: "Atlas project ID"
    username: "Username for the new user"
    password: "Password for the new user. IMPORTANT: If the user hasn't supplied an explicit password, leave it unset and under no circumstances try to generate a random one. A secure password will be generated by the MCP server if necessary."
    roles: "Roles for the new user"
    clusters: "Clusters to assign the user to, leave empty for access to all clusters"
- name: atlas-create-project
  description: "Create a MongoDB Atlas project"
  params:
    projectName: "Name for the new project"
    organizationId: "Organization ID for the new project"
- name: atlas-list-orgs
  description: "List MongoDB Atlas organizations"
- name: atlas-connect-cluster
  description: "Connect to MongoDB Atlas cluster"
  params:
    projectId: "Atlas project ID"
    clusterName: "Atlas cluster name"
    connectionType: "Type of connection (standard, private, or privateEndpoint) to an Atlas cluster"
- name: atlas-list-alerts
  description: "List MongoDB Atlas alerts"
  params:
    projectId: "Atlas project ID to list alerts for"
    status: "Status of the alerts to return. Defaults to OPEN. TRACKING means the alert condition exists but hasn't persisted beyond the notification delay. OPEN means the alert condition currently exists. CLOSED means the alert has been resolved."
    limit: "Max results per page."
    pageNum: "Page number."
- name: atlas-get-performance-advisor
  description: "Get MongoDB Atlas performance advisor recommendations and suggestions, which includes the operations: suggested indexes, drop index suggestions, schema suggestions, and a sample of the most recent (max 50) slow query logs"
  params:
    projectId: "Atlas project ID to get performance advisor recommendations. The project ID is a hexadecimal identifier of 24 characters. If the user has only specified the name, use the `atlas-list-projects` tool to retrieve the user's projects with their ids."
    clusterName: "Atlas cluster name to get performance advisor recommendations"
    operations: "Operations to get performance advisor recommendations"
    since: "Date to get slow query logs since. Must be a string in ISO 8601 format. Only relevant for the slowQueryLogs operation."
    namespaces: "Namespaces to get slow query logs. Only relevant for the slowQueryLogs operation."
- name: atlas-streams-build
  description: "Create Atlas Stream Processing resources. Use this tool for 'set up a Kafka pipeline', 'create a workspace', 'add a connection', or 'deploy a processor'. Use resource='workspace' to create a new workspace (specify cloud provider, region, and tier). Use resource='connection' to add a data source or sink to an existing workspace. Use resource='processor' to deploy a stream processor with a pipeline. Use resource='privatelink' to set up private networking. Typical workflow: create workspace -> add connections -> deploy processor."
  params:
    projectId: "Atlas project ID. Use atlas-list-projects to find project IDs if not available."
    resource: "What to create. Start with 'workspace', then 'connection', then 'processor'. Use 'privatelink' only if connections need private networking."
    workspaceName: "Workspace name. Required for workspace, connection, and processor resources. Not required for privatelink (which is project-level). For 'workspace': the name to create. For others: the existing workspace to add to. Use `atlas-streams-discover` with action 'list-workspaces' to see existing workspaces."
    cloudProvider: "Cloud provider. Required when resource='workspace'."
    region: "Cloud region. Required when resource='workspace'. Use Atlas region names: AWS examples: 'VIRGINIA_USA', 'OREGON_USA', 'DUBLIN_IRL'. Azure examples: 'eastus2', 'westeurope'. GCP examples: 'US_CENTRAL1', 'EUROPE_WEST1'."
    tier: "Processing tier. Default: SP10. Only for resource='workspace'."
    includeSampleData: "Include the sample_stream_solar connection for testing. Default: true. Only for resource='workspace'."
    connectionName: "Connection name. Required when resource='connection'."
    connectionType: "Connection type. Required when resource='connection'. Kafka: needs bootstrapServers, authentication, security config. Cluster: needs clusterName and dbRoleToExecute. S3: needs aws.roleArn (must be registered via Atlas Cloud Provider Access). Https: needs url. AWSKinesisDataStreams: needs aws.roleArn (must be registered via Atlas Cloud Provider Access). AWSLambda: needs aws.roleArn (must be registered via Atlas Cloud Provider Access). SchemaRegistry: needs provider, schemaRegistryUrls, and authentication config. Sample: provides sample data for testing (no config needed)."
    connectionConfig: "Type-specific connection configuration. Only for resource='connection'. Omit entirely for connectionType='Sample' (no config needed). You may pass a partial config - the tool uses elicitation to collect missing required fields directly from the user."
    processorName: "Processor name. Required when resource='processor'."
    pipeline: "Pipeline stages for the stream processor. Required when resource='processor'. Must start with a $source stage and end with a terminal stage ($merge, $emit, $https, or $externalFunction). Use $merge to write to Atlas cluster collections: {$merge: {into: {connectionName, db, coll}}}. Use $emit to write to Kafka or Kinesis sinks: {$emit: {connectionName, topic}}. $emit only works with Kafka/Kinesis connections - do NOT use $emit with Https connections. Use $https to POST data to an Https connection: {$https: {connectionName}}. Use $externalFunction for Lambda: {$externalFunction: {connectionName, functionName, execution: 'async', as: 'result'}}. Lambda does NOT use $emit - use $externalFunction with execution='async' as a terminal stage or execution='sync' for mid-pipeline enrichment. By default $https.onError is 'dlq', which requires a DLQ (see dlq parameter). Set {$https: {connectionName, onError: 'ignore'}} to skip DLQ. For Kafka $emit with Schema Registry: {$emit: {connectionName, topic, schemaRegistry: {connectionName: '<sr-connection>', valueSchema: {type: 'avro', schema: {<avro-schema>}, options: {subjectNameStrategy: 'TopicNameStrategy', autoRegisterSchemas: true}}}}}. Note: valueSchema.type must be lowercase 'avro'. valueSchema.schema (Avro schema definition) is always required even with autoRegisterSchemas. Kafka/Kinesis $source must include a 'topic'/'stream' field. $$NOW, $$ROOT, and $$CURRENT are not available in streaming context. Connections referenced in $source/$merge/$emit/$https must already exist in the workspace."
    dlq: "Dead letter queue configuration. Only for resource='processor'. Only include when the user explicitly requests a DLQ, or when the pipeline uses $https with default onError='dlq'. The DLQ connection must already exist in the workspace."
    autoStart: "Start the processor immediately after creation. Default: false. Only for resource='processor'. Omit unless the user explicitly asks to start the processor right away."
    privateLinkConfig: "PrivateLink configuration including provider and provider-specific fields. Required when resource='privatelink'."
- name: atlas-streams-discover
  description: "Discover and inspect Atlas Stream Processing resources. Also use for 'why is my processor failing', 'what workspaces do I have', 'show processor stats', or 'check processor health'. Use 'list-workspaces' to see all workspaces in a project. Use inspect actions for details on a specific resource. Use 'diagnose-processor' for a combined health report including state, stats, connection health, and recent errors. Use 'get-networking' for PrivateLink and account details."
  params:
    projectId: "Atlas project ID. Use atlas-list-projects to find project IDs if not available."
    action: "What to look up. Start with 'list-workspaces' to see available workspaces, then use inspect actions for details or 'diagnose-processor' for a health report."
    workspaceName: "Workspace name. Required for all actions except 'list-workspaces' and 'get-networking'."
    resourceName: "Connection or processor name. Required for 'inspect-connection', 'inspect-processor', and 'diagnose-processor'."
    responseFormat: "Response detail level. 'concise' returns names and states only. 'detailed' returns full configuration and stats. Default: 'concise' for list actions, 'detailed' for inspect/diagnose."
    cloudProvider: "Cloud provider (AWS, AZURE, GCP). Only for 'get-networking': returns account details for the specified provider."
    region: "Cloud region. Only for 'get-networking': returns account details for the specified region."
    limit: "Max results per page for list actions. Default: 20."
    pageNum: "Page number for list actions. Default: 1."
- name: atlas-streams-manage
  description: "Manage Atlas Stream Processing resources: start/stop processors, modify pipelines, update configurations. Also use for 'change the pipeline', 'scale up my processor', or 'update my workspace tier'. Common workflow: action='stop-processor' -> action='modify-processor' -> action='start-processor'. Use `atlas-streams-discover` with action 'inspect-processor' to check state before managing."
  params:
    projectId: "Atlas project ID. Use atlas-list-projects to find project IDs if not available."
    workspaceName: "Workspace name containing the resource to manage."
    action: "Action to perform. One of: 'start-processor' - begin or resume processing (requires resourceName). 'stop-processor' - pause processing (requires resourceName). 'modify-processor' - change pipeline, DLQ, or rename (requires resourceName and at least one of: pipeline, dlq, newName; processor must be stopped first). 'update-workspace' - change workspace tier or region. 'update-connection' - update connection config (requires resourceName). 'accept-peering' - accept a VPC peering request (requires peeringId, requesterAccountId, requesterVpcId). 'reject-peering' - reject a VPC peering request (requires peeringId). For peering actions, workspaceName can be any workspace in the project (peering is project-level)."
    resourceName: "Processor or connection name. Required for processor and connection actions."
    tier: "Override processing tier for this run. Must not exceed the workspace's max tier. Use `atlas-streams-discover` action='inspect-workspace' to check. Only for 'start-processor'."
    resumeFromCheckpoint: "Resume from last checkpoint on start. Default: true. Set false to reprocess from beginning (drops accumulated window state). Only for 'start-processor'."
    startAtOperationTime: "ISO 8601 timestamp to resume from. Only for 'start-processor'."
    pipeline: "New pipeline stages as an array of objects, e.g. [{$source: {connectionName: 'src'}}, {$match: {status: 'active'}}, {$merge: {into: {connectionName: 'dest', db: 'db', coll: 'coll'}}}]. Only for 'modify-processor'. Processor must be stopped first. If changing a window stage interval, the processor must be restarted with resumeFromCheckpoint=false."
    dlq: "New DLQ configuration. Only for 'modify-processor'."
    newName: "Rename processor. Only for 'modify-processor'."
    newRegion: "New region for workspace. Only for 'update-workspace'. Use Atlas region names (e.g. AWS: 'VIRGINIA_USA', Azure: 'eastus2', GCP: 'US_CENTRAL1')."
    newTier: "New default tier for workspace. Only for 'update-workspace'."
    connectionConfig: "Updated connection configuration. Only for 'update-connection'. Provide only the fields to change. Note: networking config and connection type cannot be modified after creation - to change these, delete and recreate the connection."
    peeringId: "VPC peering connection ID. Required for 'accept-peering' and 'reject-peering'."
    requesterAccountId: "AWS account ID of the peering requester. Required for 'accept-peering'."
    requesterVpcId: "VPC ID of the peering requester. Required for 'accept-peering'."
- name: atlas-streams-teardown
  description: "Delete Atlas Stream Processing resources. Also use for 'remove my workspace', 'disconnect a source', 'delete all processors', or 'clean up my streams environment'. Performs basic safety checks before deletion: summarizes counts of processors and connections, highlights connections referenced by processors where possible, and surfaces API errors if processors are still running when deletion is attempted. Use `atlas-streams-discover` to review resources before deleting."
  params:
    projectId: "Atlas project ID. Use atlas-list-projects to find project IDs if not available."
    resource: "What to delete. 'processor': stop first recommended. 'connection': ensure no processor references it. 'workspace': removes all contained connections and processors."
    workspaceName: "Workspace name. Required for workspace, connection, and processor deletion."
    resourceName: "Name or ID of the specific resource to delete."
- name: list-knowledge-sources
  description: "List available data sources in the MongoDB Assistant knowledge base. Use this to explore available data sources or to find search filter parameters to use in search-knowledge."
- name: search-knowledge
  description: "Search for information in the MongoDB Assistant knowledge base. This includes official documentation, curated expert guidance, and other resources provided by MongoDB. Supports filtering by data source and version."
  params:
    query: "A natural language query to search for in the MongoDB Assistant knowledge base. This should be a single question or a topic that is relevant to the user's MongoDB use case."
    limit: "The maximum number of results to return"
    dataSources: "A list of one or more data sources to limit the search to. You can specify a specific version of a data source by providing the version label. If not provided, the latest version of all data sources will be searched. Available data sources and their versions can be listed by calling the list-knowledge-sources tool."
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/mongodb-atlas:1.9.0
  port: 8099
  path: /
  args:
  - mongodb-mcp-server
  - --apiClientId
  - ${MDB_MCP_API_CLIENT_ID}
  - --apiClientSecret
  - ${MDB_MCP_API_CLIENT_SECRET}
  - --disabledTools
  - mongodb
