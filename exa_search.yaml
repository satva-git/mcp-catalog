name: Exa Search
shortDescription: AI-powered web search for research, company intelligence, and content extraction
description: '[![npm version](https://badge.fury.io/js/exa-mcp-server.svg)](https://www.npmjs.com/package/exa-mcp-server)


  A Model Context Protocol (MCP) server that lets AI assistants use the Exa AI Search API for web searches. Get real-time web information in a safe and controlled way with advanced search capabilities and content extraction.


  ## Features

  - **Web Search**: Real-time web searches with optimized results and content extraction

  - **Research Tools**: Specialized search for academic papers and research content

  - **Company Research**: Comprehensive business intelligence and company analysis

  - **Content Crawling**: Extract content from specific URLs, articles, and PDFs

  - **Platform-Specific Search**: LinkedIn, Wikipedia, and GitHub specialized searches

  - **Deep Research**: AI-powered comprehensive research agent for complex queries

  - **Competitor Analysis**: Identify and analyze business competitors


  ## What you''ll need to connect


  **Required:**

  - **EXA API Key**: Your Exa API key from [dashboard.exa.ai/api-keys](https://dashboard.exa.ai/api-keys)

  '
metadata:
  categories: Retrieval & Search,Science & Research,Developer Tools
icon: https://avatars.githubusercontent.com/u/77906174?v=4
repoURL: https://github.com/exa-labs/exa-mcp-server
env:
- key: EXA_API_KEY
  name: Exa API Key
  required: true
  sensitive: true
  description: Your Exa API key.
toolPreview:
- name: web_search_exa
  description: Search the web for any topic and get clean, ready-to-use content
  params:
    query: Natural language search query. Should be a semantically rich description of the ideal page, not just keywords.
    numResults: Number of search results to return (must be a number, default 8)
    type: "Search type - 'auto': balanced search (default), 'fast': quick results"
    freshness: How recent results should be. Only set when recency matters.
    includeDomains: List of domains to include in the search. If specified, results will only come from these domains.
- name: get_code_context_exa
  description: Find code examples, documentation, and programming solutions from GitHub, Stack Overflow, and docs
  params:
    query: Search query to find relevant context for APIs, Libraries, and SDKs. For example, 'React useState hook examples', 'Python pandas dataframe filtering', 'Express.js middleware', 'Next js partial prerendering configuration'
    numResults: Number of search results to return (must be a number, default 8)
- name: crawling_exa
  description: Get the full content of a specific webpage from a known URL
  params:
    urls: URLs to read. Batch multiple URLs in one call.
    maxCharacters: Maximum characters to extract per page (must be a number, default 3000)
    maxAgeHours: Maximum age of cached content in hours. 0 = always fetch fresh content, omit = use cached content with fresh fetch fallback.
    subpages: Number of subpages to also crawl from each URL.
    subpageTarget: Keywords to prioritize when selecting subpages
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/exa-search:3.2.0
  port: 8099
  path: /
  args:
  - exa-mcp-server
  - --tools=web_search_exa,get_code_context_exa,crawling_exa
