name: Firecrawl
shortDescription: Web scraping, crawling, search, and structured data extraction with Firecrawl
description: 'A Model Context Protocol (MCP) server that integrates with Firecrawl for web scraping capabilities. Perform web scraping, crawling, search, and content extraction with automatic retries and rate limiting.


  ## Features

  - **Web Scraping**: Extract content from single pages or batch process multiple URLs

  - **Site Discovery**: Map websites to discover all indexed URLs and site structure

  - **Web Search**: Search the web and optionally extract content from search results

  - **Content Crawling**: Comprehensive site crawling with depth control and filtering

  - **Structured Extraction**: Extract specific data using LLM capabilities with JSON schemas

  - **Deep Research**: In-depth, multi-source research with intelligent analysis

  - **Rate Limiting**: Automatic rate limit handling with exponential backoff and retries


  ## What you''ll need to connect


  **Required:**

  - **Firecrawl API Key**: Your Firecrawl API key (visit https://www.firecrawl.dev to get a new key)


  ## Example Usage


  - **Single URL**: Use `scrape`

  - **Multiple URLs**: Use `batch_scrape`

  - **Discover URLs**: Use `map`

  - **Web Search**: Use `search`

  - **Structured Data**: Use `extract`

  - **Whole Site Analysis**: Use `crawl` (with limits!)

  - **In-depth Research**: Use `deep_research`


  ### Quick Reference Table


  | Tool                | Best for                                 | Returns         |

  | ------------------- | ---------------------------------------- | --------------- |

  | scrape              | Single page content                      | markdown/html   |

  | batch_scrape        | Multiple known URLs                      | markdown/html[] |

  | map                 | Discovering URLs on a site               | URL[]           |

  | crawl               | Multi-page extraction (with limits)      | markdown/html[] |

  | search              | Web search for info                      | results[]       |

  | extract             | Structured data from pages               | JSON            |

  | deep_research       | In-depth, multi-source research          | summary, sources|

  | generate_llmstxt    | LLMs.txt for a domain                    | text            |

  '
metadata:
  categories: Retrieval & Search,Automation & Browsers,Science & Research
  source: vendor
icon: https://avatars.githubusercontent.com/u/135057108?v=4
repoURL: https://github.com/firecrawl/firecrawl-mcp-server
toolPreview:
- name: firecrawl_scrape
  description: Scrape content from a single URL with advanced options.
  params:
    url: The URL to scrape
    formats: Content formats to extract
    jsonOptions: JSON extraction options
    screenshotOptions: Screenshot options
    parsers: Parsers to apply
    pdfOptions: PDF parsing options
    onlyMainContent: Extract only the main content
    includeTags: HTML tags to specifically include
    excludeTags: HTML tags to exclude
    waitFor: Time in milliseconds to wait before scraping
    actions: Browser actions to perform before scraping
    mobile: Use mobile viewport
    skipTlsVerification: Skip TLS certificate verification
    removeBase64Images: Remove base64 encoded images from output
    location: Location settings for scraping
    storeInCache: Store the result in cache
    zeroDataRetention: Enable zero data retention
    maxAge: Maximum cache age in milliseconds
    proxy: Proxy mode
- name: firecrawl_map
  description: Map a website to discover all indexed URLs on the site.
  params:
    url: Starting URL for URL discovery
    search: Search term to filter discovered URLs
    sitemap: Sitemap mode
    includeSubdomains: Include URLs from subdomains
    limit: Maximum number of URLs to return
    ignoreQueryParameters: Ignore query parameters when comparing URLs
- name: firecrawl_crawl
  description: Starts a crawl job on a website and extracts content from all pages.
  params:
    url: Starting URL for the crawl
    prompt: Prompt to guide the crawl
    excludePaths: URL paths to exclude from crawling
    includePaths: Only crawl these URL paths
    maxDiscoveryDepth: Maximum discovery depth to crawl
    sitemap: Sitemap mode
    limit: Maximum number of pages to crawl
    allowExternalLinks: Allow crawling links to external domains
    allowSubdomains: Allow crawling links to subdomains
    crawlEntireDomain: Crawl the entire domain
    delay: Delay between crawl requests
    maxConcurrency: Maximum number of concurrent crawl requests
    webhook: Webhook URL for crawl updates
    webhookHeaders: Headers to send with the webhook
    deduplicateSimilarURLs: Remove similar URLs during crawl
    ignoreQueryParameters: Ignore query parameters when comparing URLs
    scrapeOptions: Options for scraping each page
- name: firecrawl_check_crawl_status
  description: Check the status of a crawl job.
  params:
    id: Crawl job ID to check
- name: firecrawl_search
  description: Search the web and optionally extract content from search results.
  params:
    query: Search query string
    limit: Maximum number of results to return
    tbs: Time-based search filter
    filter: Search filter
    location: Search location string
    sources: Search sources to use
    scrapeOptions: Options for scraping search results
    enterprise: Enterprise search modes
- name: firecrawl_extract
  description: Extract structured information from web pages using LLM capabilities.
  params:
    urls: Array of URLs to extract information from
    prompt: Custom prompt for the LLM extraction
    schema: JSON schema for structured data extraction
    allowExternalLinks: Allow extraction from external links
    enableWebSearch: Enable web search for additional context
    includeSubdomains: Include subdomains in extraction
- name: firecrawl_agent
  description: Autonomous web research agent.
  params:
    prompt: Natural language description of the data you want (required, max 10,000 characters)
    urls: Optional array of URLs to focus the agent on specific pages
    schema: Optional JSON schema for structured output
- name: firecrawl_agent_status
  description: Check the status of an agent job and retrieve results when complete.
  params:
    id: Agent job ID to check
- name: firecrawl_browser_create
  description: Create a browser session for code execution via CDP (Chrome DevTools Protocol).
  params:
    ttl: Total session lifetime in seconds (30-3600, optional)
    activityTtl: Idle timeout in seconds (10-3600, optional)
    streamWebView: Whether to enable live view streaming (optional)
    profile: Save and reuse browser state (cookies, localStorage) across sessions (optional)
- name: firecrawl_browser_execute
  description: Execute code in a browser session.
  params:
    sessionId: The browser session ID (required)
    code: The code to execute (required)
    language: '"bash", "python", or "node" (optional, defaults to "bash")'
- name: firecrawl_browser_delete
  description: Destroy a browser session.
  params:
    sessionId: The browser session ID
- name: firecrawl_browser_list
  description: List browser sessions, optionally filtered by status.
  params:
    status: Session status filter
env:
- key: FIRECRAWL_API_KEY
  name: Firecrawl API Key
  required: true
  sensitive: true
  description: Your Firecrawl API key.
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/firecrawl:3.11.0
  port: 8099
  path: /
  args:
  - firecrawl-mcp
