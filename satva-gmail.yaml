name: Satva Gmail
shortDescription: Gmail with automatic send + forward-with-attachments (receipts, PDFs, etc.)
description: |
  A custom Gmail MCP server for Satva with capabilities the default Gmail connector lacks:

  ## What makes Satva Gmail different
  - **Automatic sending** — send emails directly without requiring a manual click in the Gmail UI.
  - **Forward with attachments** — forward an existing Gmail message (e.g. vendor receipts, PDF invoices) to new recipients while preserving the original attachments. Supports an optional note above the forwarded body.

  ## Features
  - **List & Read Emails**: Advanced filtering by label, category, date range, and Gmail search syntax
  - **Send Email**: Auto-send emails (no draft-first step required)
  - **Forward Email**: Forward any Gmail message with attachments preserved by default — toggle off with `include_attachments=false`
  - **Drafts**: Create, update, send, delete drafts
  - **Labels**: Create, update, delete, apply, and remove labels
  - **Attachments**: List attachments on any message
  - **OAuth2 Authentication**: Secure Google OAuth handled automatically

  ## What you'll need to connect
  **No Setup Required**: Authentication is handled automatically through OAuth2 workflow.

metadata:
  categories: Business
  allow-multiple: "true"
icon: https://img.icons8.com/?size=100&id=P7UIlhbpWzZm&format=png&color=000000
repoURL: https://github.com/satva-git/google-mcp-custom/tree/main/gmail
runtime: remote
remoteConfig:
  fixedURL: https://googlegmailmcp.satva.xyz/mcp/gmail
toolPreview:
  - name: list_emails
    description: List emails in the user's Gmail account with advanced filtering options.
    params:
      max_results: "Maximum number of emails to return (1-1000, default 50)"
      query: Gmail search query for filtering emails
      label_ids: Comma-separated list of label IDs to filter by
      category: Email category filter (primary, social, promotions, updates, forums)
      after: ISO 8601 timestamp — only return emails received after this
      before: ISO 8601 timestamp — only return emails received before this
  - name: read_email
    description: Read a specific email by ID or subject.
    params:
      email_id: Email ID to read
      email_subject: Email subject to search for
      user_timezone: "User's timezone (default UTC)"
  - name: send_email
    description: Send a new email immediately from the user's Gmail account.
    params:
      to_emails: Comma-separated list of recipient email addresses
      subject: Email subject
      message: Email body content
      cc_emails: Comma-separated list of CC recipients
      bcc_emails: Comma-separated list of BCC recipients
  - name: forward_email
    description: Forward an existing Gmail message to new recipients. By default preserves original attachments (receipts, PDFs, etc.).
    params:
      message_id: Gmail message ID of the email to forward
      to_emails: Comma-separated list of email addresses to forward to
      cc_emails: Comma-separated list of CC recipients (optional)
      bcc_emails: Comma-separated list of BCC recipients (optional)
      additional_message: Optional note prepended above the forwarded body
      include_attachments: "If true (default), preserve original attachments; set false to forward without them"
  - name: list_drafts
    description: List all draft emails in the user's account.
    params:
      max_results: "Maximum number of drafts to return (1-1000, default 100)"
  - name: create_draft
    description: Create a new draft email.
    params:
      to_emails: Comma-separated list of recipient email addresses
      subject: Email subject
      message: Email body content
      cc_emails: Comma-separated list of CC recipients
      bcc_emails: Comma-separated list of BCC recipients
      reply_to_email_id: ID of email to reply to
      reply_all: Whether to reply to all recipients
  - name: update_draft
    description: Update an existing draft email.
    params:
      draft_id: ID of the draft to update
      to_emails: Comma-separated list of recipient email addresses
      subject: Email subject
      message: Email body content
      cc_emails: Comma-separated list of CC recipients
      bcc_emails: Comma-separated list of BCC recipients
  - name: send_draft
    description: Send a draft email.
    params:
      draft_id: ID of the draft to send
  - name: delete_draft
    description: Delete an existing draft.
    params:
      draft_id: ID of the draft to delete
  - name: delete_email
    description: Delete an email message.
    params:
      email_id: ID of the email to delete
  - name: list_labels
    description: List all labels in the user's account.
    params:
      label_id: Specific label ID to fetch (optional)
  - name: create_label
    description: Create a new custom label.
    params:
      label_name: Name of the label to create
      label_list_visibility: "Label list visibility: labelShow, labelHide, labelShowIfUnread"
      message_list_visibility: "Message list visibility: show, hide"
  - name: update_label
    description: Update an existing label's properties.
    params:
      label_id: ID of the label to update
      label_name: New name for the label
  - name: delete_label
    description: Delete a custom label.
    params:
      label_id: ID of the label to delete
  - name: modify_message_labels
    description: Modify labels and properties of an email message.
    params:
      email_id: ID of the email message
      add_label_ids: List of label IDs to add
      remove_label_ids: List of label IDs to remove
      archive: Whether to archive the message
      mark_as_read: Whether to mark as read
      mark_as_starred: Whether to mark as starred
      mark_as_important: Whether to mark as important
      apply_action_to_thread: Apply action to entire thread
  - name: list_attachments
    description: List all attachments in an email.
    params:
      email_id: ID of the email to check for attachments
  - name: get_current_email_address
    description: Get the current user's email address.
