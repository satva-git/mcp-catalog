name: Tool Preview Refresh

on:
  workflow_dispatch:
    inputs:
      yaml_file:
        description: Select a YAML file to refresh.
        required: true
        default: antv_charts.yaml
        type: choice
        options:
          - antv_charts.yaml
          - asana.yaml
          - atlassian.yaml
          - aws.yaml
          - aws_cdk.yaml
          - aws_documentation.yaml
          - aws_eks.yaml
          - aws_kendra.yaml
          - aws_knowledge.yaml
          - aws_redshift.yaml
          - azure.yaml
          - bigquery.yaml
          - brave_search.yaml
          - browserbase.yaml
          - calendar.yaml
          - chroma.yaml
          - cloud_run.yaml
          - cloudflare.yaml
          - contact.yaml
          - context7.yaml
          - datadog.yaml
          - deepwiki.yaml
          - digitalocean.yaml
          - duckduckgo_search.yaml
          - dynatrace.yaml
          - elasticsearch.yaml
          - exa_search.yaml
          - excel.yaml
          - filescom.yaml
          - firecrawl.yaml
          - github.yaml
          - github_enterprise.yaml
          - gitlab.yaml
          - gitmcp.yaml
          - gmail.yaml
          - google-calendar.yaml
          - google-drive.yaml
          - google-maps-grounding-lite.yaml
          - google-sheets.yaml
          - grafana.yaml
          - hubspot.yaml
          - linear.yaml
          - markitdown.yaml
          - microsoft-docs.yaml
          - mondaycom.yaml
          - mongodb_atlas_management.yaml
          - mongodb_database.yaml
          - morningstar.yaml
          - neon.yaml
          - notion.yaml
          - onedrive.yaml
          - outlook.yaml
          - pagerduty.yaml
          - paypal.yaml
          - playwright.yaml
          - postgresql.yaml
          - postman.yaml
          - redis.yaml
          - ref.yaml
          - render.yaml
          - salesforce.yaml
          - slack.yaml
          - snowflake.yaml
          - square.yaml
          - stripe.yaml
          - supabase.yaml
          - tableau.yaml
          - tavily_search.yaml
          - terraform.yaml
          - todoist.yaml
          - wix.yaml
          - word.yaml
          - wordpress.yaml
          - zapier.yaml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tool-preview-refresh
  cancel-in-progress: false

jobs:
  refresh-tool-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Install mcptools
        run: |
          go install github.com/f/mcptools/cmd/mcptools@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Run OpenCode refresh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YAML_FILE: ${{ inputs.yaml_file }}
        run: bash scripts/tool_preview_updater/update.sh "$YAML_FILE"

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain -- '*.yaml')" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: automated/tool-preview-refresh
          delete-branch: true
          commit-message: "chore: refresh MCP tool previews"
          reviewers: thedadams,njhale,g-linville,calvinmclean
          title: "chore: refresh MCP tool previews"
          body: |
            This PR refreshes stale `toolPreview` blocks in catalog YAML files.

            Generated by the scheduled/manual OpenCode CLI workflow.
