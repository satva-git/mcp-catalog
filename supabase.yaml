name: Supabase
shortDescription: Manage Supabase projects, databases, Edge Functions, and storage with AI assistance
description: '![supabase-mcp-demo](https://github.com/user-attachments/assets/3fce101a-b7d4-482f-9182-0be70ed1ad56)


  A Model Context Protocol (MCP) server that connects your Supabase projects to AI assistants. This server enables AI assistants to perform comprehensive Supabase operations including managing tables, fetching configurations, querying data, and deploying Edge Functions across your development workflow.


  ## Features

  - **Project Management**: Create, pause, restore projects and manage organizations with cost tracking

  - **Database Operations**: Execute SQL queries, apply migrations, manage tables and extensions

  - **Development Tools**: Generate TypeScript types, get API URLs and keys for seamless integration

  - **Edge Functions**: Deploy and manage serverless functions directly from AI assistants

  - **Branching Support**: Create development branches, merge changes, and handle migration drift (paid plans)

  - **Storage Management**: Manage buckets and storage configurations

  - **Documentation Search**: Search Supabase docs for up-to-date information and guidance


  ## What you''ll need to connect


  **Required:**

  - **Supabase Personal Access Token**: Create at [Supabase settings](https://supabase.com/dashboard/account/tokens)

  '
metadata:
  categories: Databases
icon: https://avatars.githubusercontent.com/u/87650496?s=48&v=4
repoURL: https://github.com/supabase-community/supabase-mcp
env:
- key: SUPABASE_ACCESS_TOKEN
  name: Supabase Personal Access Token
  required: true
  sensitive: true
  description: Your Supabase Personal Access Token.
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/supabase:0.7.0
  port: 8099
  path: /
  args:
  - mcp-server-supabase
toolPreview:
- name: list_projects
  description: Lists all Supabase projects for the user.
- name: get_project
  description: Gets details for a project.
- name: create_project
  description: Creates a new Supabase project.
- name: pause_project
  description: Pauses a project.
- name: restore_project
  description: Restores a project.
- name: list_organizations
  description: Lists all organizations that the user is a member of.
- name: get_organization
  description: Gets details for an organization.
- name: get_cost
  description: Gets the cost of a new project or branch for an organization.
- name: confirm_cost
  description: Confirms the user's understanding of new project or branch costs. This is required to create a new project or branch.
- name: search_docs
  description: Searches the Supabase documentation for up-to-date information. LLMs can use this to find answers to questions or learn how to use specific features.
- name: list_tables
  description: Lists all tables within the specified schemas.
- name: list_extensions
  description: Lists all extensions in the database.
- name: list_migrations
  description: Lists all migrations in the database.
- name: apply_migration
  description: Applies a SQL migration to the database. SQL passed to this tool will be tracked within the database, so LLMs should use this for DDL operations (schema changes).
- name: execute_sql
  description: Executes raw SQL in the database. LLMs should use this for regular queries that don't change the schema.
- name: get_logs
  description: Gets logs for a Supabase project by service type (api, postgres, edge functions, auth, storage, realtime). LLMs can use this to help with debugging and monitoring service performance.
- name: get_advisors
  description: Gets a list of advisory notices for a Supabase project. LLMs can use this to check for security vulnerabilities or performance issues.
- name: get_project_url
  description: Gets the API URL for a project.
- name: get_publishable_keys
  description: Gets the anonymous API keys for a project. Returns an array of client-safe API keys including legacy anon keys and modern publishable keys. Publishable keys are recommended for new applications.
- name: generate_typescript_types
  description: Generates TypeScript types based on the database schema. LLMs can save this to a file and use it in their code.
- name: list_edge_functions
  description: Lists all Edge Functions in a Supabase project.
- name: get_edge_function
  description: Retrieves file contents for an Edge Function in a Supabase project.
- name: deploy_edge_function
  description: Deploys a new Edge Function to a Supabase project. LLMs can use this to deploy new functions or update existing ones.
- name: create_branch
  description: Creates a development branch with migrations from production branch.
- name: list_branches
  description: Lists all development branches.
- name: delete_branch
  description: Deletes a development branch.
- name: merge_branch
  description: Merges migrations and edge functions from a development branch to production.
- name: reset_branch
  description: Resets migrations of a development branch to a prior version.
- name: rebase_branch
  description: Rebases development branch on production to handle migration drift.
